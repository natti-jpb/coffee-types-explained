<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nº 1 · Diagrama — Tipos de Café</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☕</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #F4ECDF;
    background-image: radial-gradient(circle at 18% -12%, #FCF7ED 0%, transparent 55%);
    color: #3E2415;
    font-family: Inter, system-ui, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 34px;
    font-size: 11.5px;
    letter-spacing: .16em;
    text-transform: uppercase;
  }
  nav a { color: #8a6a4f; text-decoration: none; transition: color .25s; }
  nav a:hover { color: #3E2415; }
  nav .vars { display: flex; gap: 16px; }
  nav .vars .on { color: #3E2415; border-bottom: 1px solid #3E2415; }

  header { text-align: center; padding: 40px 20px 12px; }
  .eyebrow {
    font-size: 11px;
    letter-spacing: .36em;
    text-transform: uppercase;
    color: #A5764C;
  }
  h1 {
    font-family: Fraunces, Georgia, serif;
    font-style: italic;
    font-weight: 380;
    font-size: clamp(42px, 6vw, 74px);
    line-height: 1.05;
    margin: 12px 0 14px;
  }
  .lead { color: #7d5f46; font-size: 15px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(252px, 1fr));
    gap: 22px;
    max-width: 1180px;
    margin: 40px auto 70px;
    padding: 0 28px;
  }

  .card {
    background: #FFFDF7;
    border: 1px solid rgba(62, 36, 21, .07);
    border-radius: 22px;
    padding: 26px 16px 24px;
    transition: transform .55s cubic-bezier(.22, 1, .36, 1), box-shadow .55s, opacity .4s;
    position: relative;
  }
  .grid:hover .card:not(:hover) { opacity: .42; transform: scale(.975); }
  .card:hover {
    transform: translateY(-10px) scale(1.08);
    box-shadow: 0 34px 64px -22px rgba(62, 36, 21, .38);
    z-index: 3;
  }

  .card svg { display: block; width: 100%; max-width: 268px; margin: 0 auto; overflow: visible; }

  .card h2 {
    font-family: Fraunces, Georgia, serif;
    font-weight: 470;
    font-size: 23px;
    text-align: center;
    margin-top: 12px;
  }
  .card .sub {
    text-align: center;
    font-size: 11px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: #A5764C;
    margin-top: 6px;
  }

  /* ---- cup anatomy ---- */
  .glass {
    fill: none;
    stroke: #3E2415;
    stroke-width: 3;
    stroke-linecap: round;
    transition: opacity .5s;
  }
  .card:hover .glass { opacity: .28; }

  .layer {
    transition: transform .6s cubic-bezier(.32, 1.4, .38, 1) calc(var(--k) * 48ms);
  }
  .card:hover .layer { transform: translateY(calc(var(--k) * -20px)); }

  .lbl { opacity: 0; transform: translateX(-7px); transition: opacity .35s ease, transform .35s ease; }
  .card:hover .lbl {
    opacity: 1;
    transform: none;
    transition-delay: calc(var(--k) * 48ms + .16s);
  }
  .lbl line { stroke: #B08A63; stroke-width: 1.2; }
  .lbl text { font: 500 11px Inter, sans-serif; fill: #6b4a33; letter-spacing: .02em; }

  .steam { transition: opacity .3s; }
  .card:hover .steam { opacity: 0; }
  .steam path {
    fill: none;
    stroke: #C9A987;
    stroke-width: 2;
    stroke-linecap: round;
    opacity: 0;
    animation: steam 3.2s ease-in-out infinite;
  }
  .steam path:nth-child(2) { animation-delay: 1.3s; }
  @keyframes steam {
    0%, 100% { opacity: 0; transform: translateY(5px); }
    40% { opacity: .65; }
    75% { opacity: .1; transform: translateY(-7px); }
  }

  footer {
    text-align: center;
    padding: 0 20px 46px;
    font-size: 12px;
    color: #a98a6f;
  }
</style>
</head>
<body>

<nav>
  <a href="index.html">← tipos de café</a>
  <div class="vars">
    <a class="on" href="variacao-1.html">Nº1</a>
    <a href="variacao-2.html">Nº2</a>
    <a href="variacao-3.html">Nº3</a>
  </div>
</nav>

<header>
  <p class="eyebrow">guia visual</p>
  <h1>Os cafés, por dentro</h1>
  <p class="lead">Passe o mouse sobre uma xícara para abrir o diagrama.</p>
</header>

<main class="grid" id="grid"></main>

<footer>Proporções aproximadas — cada barista tem a sua.</footer>

<script>
const CAFES = [
  {
    id: "espresso", name: "Espresso", sub: "a base de tudo", fill: 0.40,
    layers: [
      { n: "espresso", f: 0.80, c: "#3A2114", q: "30 ml" },
      { n: "crema", f: 0.20, c: "#C98A4B", q: "topo" },
    ],
  },
  {
    id: "macchiato", name: "Macchiato", sub: "espresso manchado", fill: 0.48,
    layers: [
      { n: "espresso", f: 0.70, c: "#3A2114", q: "2/3" },
      { n: "espuma de leite", f: 0.30, c: "#F6EDDE", q: "1/3" },
    ],
  },
  {
    id: "cortado", name: "Cortado", sub: "meio a meio", fill: 0.55,
    layers: [
      { n: "espresso", f: 0.50, c: "#3A2114", q: "1/2" },
      { n: "leite vaporizado", f: 0.50, c: "#E9D8C1", q: "1/2" },
    ],
  },
  {
    id: "flatwhite", name: "Flat White", sub: "veludo australiano", fill: 0.82,
    layers: [
      { n: "espresso", f: 0.34, c: "#3A2114", q: "1/3" },
      { n: "leite vaporizado", f: 0.55, c: "#E9D8C1", q: "2/3" },
      { n: "microespuma", f: 0.11, c: "#F6EDDE", q: "véu" },
    ],
  },
  {
    id: "cappuccino", name: "Cappuccino", sub: "a trindade italiana", fill: 0.90,
    layers: [
      { n: "espresso", f: 1 / 3, c: "#3A2114", q: "1/3" },
      { n: "leite vaporizado", f: 1 / 3, c: "#E9D8C1", q: "1/3" },
      { n: "espuma de leite", f: 1 / 3, c: "#F6EDDE", q: "1/3" },
    ],
  },
  {
    id: "latte", name: "Latte", sub: "abraço de leite", fill: 0.95,
    layers: [
      { n: "espresso", f: 0.17, c: "#3A2114", q: "1/6" },
      { n: "leite vaporizado", f: 0.66, c: "#E9D8C1", q: "4/6" },
      { n: "espuma de leite", f: 0.17, c: "#F6EDDE", q: "1/6" },
    ],
  },
  {
    id: "mochaccino", name: "Mochaccino", sub: "café com chocolate", fill: 0.95,
    layers: [
      { n: "chocolate", f: 0.25, c: "#6B3A21", q: "1/4" },
      { n: "espresso", f: 0.25, c: "#3A2114", q: "1/4" },
      { n: "leite vaporizado", f: 0.40, c: "#E9D8C1", q: "2/4" },
      { n: "chantilly", f: 0.10, c: "#FBF4E6", q: "topo" },
    ],
  },
  {
    id: "americano", name: "Americano", sub: "alongado e suave", fill: 0.80,
    layers: [
      { n: "espresso", f: 1 / 3, c: "#3A2114", q: "1/3" },
      { n: "água quente", f: 2 / 3, c: "#A5754F", q: "2/3", op: 0.88 },
    ],
  },
];

function cupSVG(c) {
  const gx = 120, gw = 100, gy = 70, gb = 280;      // glass outline
  const ix = gx + 4, iw = gw - 8, ib = gb - 4;      // liquid area
  const ih = ib - (gy + 4);
  const liquidH = c.fill * ih;
  const last = c.layers.length - 1;
  let cursor = ib;
  const parts = [];

  c.layers.forEach((L, k) => {
    const h = L.f * liquidH;
    const y = cursor - h;
    const x = ix, w = iw;
    const op = L.op ? ` fill-opacity="${L.op}"` : "";
    let shape;
    if (k === 0) {
      const r = Math.min(9, h / 2);
      shape = `<path d="M${x} ${y} H${x + w} V${cursor - r} Q${x + w} ${cursor} ${x + w - r} ${cursor} H${x + r} Q${x} ${cursor} ${x} ${cursor - r} Z" fill="${L.c}"${op}/>`;
    } else if (k === last) {
      const r = Math.min(4, h / 2);
      shape = `<path d="M${x} ${y + r} Q${x} ${y} ${x + r} ${y} H${x + w - r} Q${x + w} ${y} ${x + w} ${y + r} V${cursor} H${x} Z" fill="${L.c}"${op}/>`;
    } else {
      shape = `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${L.c}"${op}/>`;
    }
    const yc = y + h / 2;
    parts.push(
      `<g class="layer" style="--k:${k}">${shape}` +
      `<g class="lbl"><line x1="${gx + gw + 5}" y1="${yc}" x2="${gx + gw + 17}" y2="${yc}"/>` +
      `<text x="${gx + gw + 22}" y="${yc + 3.5}">${L.n} · ${L.q}</text></g></g>`
    );
    cursor = y;
  });

  return `<svg viewBox="0 0 340 330" role="img" aria-label="Camadas do ${c.name}">
    <g class="steam"><path d="M156 54 C151 45 161 38 156 28"/><path d="M173 58 C168 47 178 40 173 30"/></g>
    ${parts.join("")}
    <path class="glass" d="M120 70 V266 Q120 280 134 280 H206 Q220 280 220 266 V70"/>
  </svg>`;
}

const grid = document.getElementById("grid");
CAFES.forEach((c) => {
  const card = document.createElement("article");
  card.className = "card";
  card.innerHTML = cupSVG(c) + `<h2>${c.name}</h2><p class="sub">${c.sub}</p>`;
  grid.appendChild(card);
});
</script>
</body>
</html>

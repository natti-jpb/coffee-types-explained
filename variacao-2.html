<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nº 2 · Corte do Barista — Tipos de Café</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☕</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #140D07;
    background-image: radial-gradient(ellipse 90% 60% at 50% -10%, rgba(210, 162, 107, .09), transparent);
    color: #F0E3CE;
    font-family: Inter, system-ui, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 34px;
    font-size: 11.5px;
    letter-spacing: .16em;
    text-transform: uppercase;
  }
  nav a { color: #9c7a54; text-decoration: none; transition: color .25s; }
  nav a:hover { color: #F0E3CE; }
  nav .vars { display: flex; gap: 16px; }
  nav .vars .on { color: #F0E3CE; border-bottom: 1px solid #D2A26B; }

  header { text-align: center; padding: 42px 20px 10px; }
  .eyebrow { font-size: 11px; letter-spacing: .38em; text-transform: uppercase; color: #D2A26B; }
  h1 {
    font-family: Fraunces, Georgia, serif;
    font-style: italic;
    font-weight: 360;
    font-size: clamp(42px, 6vw, 74px);
    line-height: 1.05;
    margin: 12px 0 14px;
  }
  .lead { color: #9c8266; font-size: 15px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(285px, 1fr));
    gap: 20px;
    max-width: 1260px;
    margin: 44px auto 70px;
    padding: 0 28px;
  }

  .card {
    background: linear-gradient(180deg, #1E1309, #180F08);
    border: 1px solid #2E1F12;
    border-radius: 20px;
    padding: 24px 20px 26px;
    transition: transform .55s cubic-bezier(.22, 1, .36, 1), border-color .5s, box-shadow .55s;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    transform: translateY(-9px);
    border-color: rgba(210, 162, 107, .45);
    box-shadow: 0 34px 70px -28px rgba(0, 0, 0, .9), 0 0 60px -30px rgba(210, 162, 107, .5);
    z-index: 3;
  }

  .stage { position: relative; height: 262px; }
  .cupbox {
    height: 100%;
    display: flex;
    justify-content: center;
    transition: transform .65s cubic-bezier(.25, 1, .35, 1);
  }
  .card:hover .cupbox { transform: translateX(-38px) scale(1.05); }
  .stage svg { height: 100%; overflow: visible; }

  /* ---- ceramic halves ---- */
  .half {
    transform-box: fill-box;
    transform-origin: center;
    transition: transform .7s cubic-bezier(.3, 1, .35, 1), opacity .55s ease;
  }
  .card:hover .hl { transform: translate(-46px, 5px) rotate(-7deg); opacity: .07; }
  .card:hover .hr { transform: translate(46px, 5px) rotate(7deg); opacity: .07; }

  .face { fill: #EDE0CC; }
  .rim { stroke: #d8c6ab; stroke-width: 2.5; stroke-linecap: round; }
  .handle { fill: none; stroke: #EDE0CC; stroke-width: 11; stroke-linecap: round; }
  .art { fill: none; stroke: #C49A6C; stroke-width: 1.7; stroke-linecap: round; opacity: .85; }

  .saucer-b { fill: #1E1309; stroke: #34230f; }
  .saucer-r { fill: none; stroke: rgba(210, 162, 107, .35); }

  .glow { opacity: 0; transition: opacity .7s; }
  .card:hover .glow { opacity: 1; }

  /* ---- liquid layers (rise into the cup) ---- */
  .layer {
    transform: translateY(165px);
    transition: transform .85s cubic-bezier(.22, 1, .36, 1) calc(var(--k) * 90ms);
  }
  .card:hover .layer { transform: translateY(0); transition-delay: calc(var(--k) * 95ms + .14s); }

  /* ---- key / legend ---- */
  .key {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 11px;
    width: 118px;
  }
  .key li {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    opacity: 0;
    transform: translateX(14px);
    transition: opacity .4s ease, transform .4s ease;
  }
  .card:hover .key li {
    opacity: 1;
    transform: none;
    transition-delay: calc(var(--i) * 80ms + .3s);
  }
  .key .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; box-shadow: 0 0 0 1px rgba(240, 227, 206, .18); }
  .key .kn { color: #c9b394; line-height: 1.25; }
  .key .kf { margin-left: auto; color: #D2A26B; font-weight: 600; }

  .card h2 {
    font-family: Fraunces, Georgia, serif;
    font-weight: 440;
    font-size: 24px;
    text-align: center;
    margin-top: 16px;
  }
  .card .sub {
    text-align: center;
    font-size: 10.5px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: #D2A26B;
    margin-top: 6px;
  }
  .card .desc {
    text-align: center;
    font-size: 12.5px;
    line-height: 1.6;
    color: #8f7459;
    margin: 10px auto 0;
    max-width: 250px;
  }

  footer { text-align: center; padding: 0 20px 46px; font-size: 12px; color: #6e5237; }
</style>
</head>
<body>

<nav>
  <a href="index.html">← tipos de café</a>
  <div class="vars">
    <a href="variacao-1.html">Nº1</a>
    <a class="on" href="variacao-2.html">Nº2</a>
    <a href="variacao-3.html">Nº3</a>
  </div>
</nav>

<header>
  <p class="eyebrow">o corte do barista</p>
  <h1>Dentro da xícara</h1>
  <p class="lead">Passe o mouse: a cerâmica se parte e revela as camadas.</p>
</header>

<main class="grid" id="grid"></main>

<footer>Proporções aproximadas — cada barista tem a sua.</footer>

<script>
const CAFES = [
  {
    id: "espresso", name: "Espresso", sub: "a base de tudo",
    desc: "30 ml extraídos sob 9 bars de pressão. Intenso, encorpado, coroado por uma crema dourada.",
    fill: 0.40,
    layers: [
      { n: "espresso", f: 0.80, c: "#3A2114", q: "30 ml" },
      { n: "crema", f: 0.20, c: "#C98A4B", q: "topo" },
    ],
  },
  {
    id: "macchiato", name: "Macchiato", sub: "espresso manchado",
    desc: "Um espresso “manchado” por uma colher de espuma de leite. O café continua no comando.",
    fill: 0.48,
    layers: [
      { n: "espresso", f: 0.70, c: "#3A2114", q: "2/3" },
      { n: "espuma de leite", f: 0.30, c: "#F6EDDE", q: "1/3" },
    ],
  },
  {
    id: "cortado", name: "Cortado", sub: "meio a meio",
    desc: "Espresso cortado por partes iguais de leite vaporizado. Equilíbrio de origem espanhola.",
    fill: 0.55,
    layers: [
      { n: "espresso", f: 0.50, c: "#3A2114", q: "1/2" },
      { n: "leite vaporizado", f: 0.50, c: "#E9D8C1", q: "1/2" },
    ],
  },
  {
    id: "flatwhite", name: "Flat White", sub: "veludo australiano",
    desc: "Espresso duplo sob leite com microespuma finíssima. Textura aveludada, sabor presente.",
    fill: 0.82,
    layers: [
      { n: "espresso", f: 0.34, c: "#3A2114", q: "1/3" },
      { n: "leite vaporizado", f: 0.55, c: "#E9D8C1", q: "2/3" },
      { n: "microespuma", f: 0.11, c: "#F6EDDE", q: "véu" },
    ],
  },
  {
    id: "cappuccino", name: "Cappuccino", sub: "a trindade italiana",
    desc: "Um terço espresso, um terço leite, um terço espuma. O clássico italiano em proporção perfeita.",
    fill: 0.90,
    layers: [
      { n: "espresso", f: 1 / 3, c: "#3A2114", q: "1/3" },
      { n: "leite vaporizado", f: 1 / 3, c: "#E9D8C1", q: "1/3" },
      { n: "espuma de leite", f: 1 / 3, c: "#F6EDDE", q: "1/3" },
    ],
  },
  {
    id: "latte", name: "Latte", sub: "abraço de leite",
    desc: "Um espresso envolvido por muito leite vaporizado e uma fina coroa de espuma.",
    fill: 0.95,
    layers: [
      { n: "espresso", f: 0.17, c: "#3A2114", q: "1/6" },
      { n: "leite vaporizado", f: 0.66, c: "#E9D8C1", q: "4/6" },
      { n: "espuma de leite", f: 0.17, c: "#F6EDDE", q: "1/6" },
    ],
  },
  {
    id: "mochaccino", name: "Mochaccino", sub: "café com chocolate",
    desc: "Chocolate, espresso e leite vaporizado, coberto por chantilly. A ponte entre café e sobremesa.",
    fill: 0.95,
    layers: [
      { n: "chocolate", f: 0.25, c: "#6B3A21", q: "1/4" },
      { n: "espresso", f: 0.25, c: "#3A2114", q: "1/4" },
      { n: "leite vaporizado", f: 0.40, c: "#E9D8C1", q: "2/4" },
      { n: "chantilly", f: 0.10, c: "#FBF4E6", q: "topo" },
    ],
  },
  {
    id: "americano", name: "Americano", sub: "alongado e suave",
    desc: "Espresso alongado com água quente. Corpo de coado, alma de espresso.",
    fill: 0.80,
    layers: [
      { n: "espresso", f: 1 / 3, c: "#3A2114", q: "1/3" },
      { n: "água quente", f: 2 / 3, c: "#A5754F", q: "2/3", op: 0.88 },
    ],
  },
];

const CUP_PATH = "M92 104 L228 104 L215 240 Q212 258 191 258 L129 258 Q108 258 105 240 Z";
const ROSETTA =
  '<path class="art" d="M160 132 C160 158 160 196 160 226"/>' +
  '<path class="art" d="M160 152 C146 154 140 165 149 173"/>' +
  '<path class="art" d="M160 152 C174 154 180 165 171 173"/>' +
  '<path class="art" d="M160 178 C148 180 143 190 151 197"/>' +
  '<path class="art" d="M160 178 C172 180 177 190 169 197"/>' +
  '<path class="art" d="M160 202 C150 204 146 212 153 218"/>' +
  '<path class="art" d="M160 202 C170 204 174 212 167 218"/>';

function cupSVG(c) {
  const yb = 256;                 // liquid bottom
  const liquidH = c.fill * 140;   // max liquid zone
  let cursor = yb;
  const rects = c.layers.map((L, k) => {
    const h = L.f * liquidH;
    const y = cursor - h;
    cursor = y;
    const op = L.op ? ` fill-opacity="${L.op}"` : "";
    return `<rect class="layer" style="--k:${k}" x="78" y="${y}" width="164" height="${h + 1}" fill="${L.c}"${op}/>`;
  }).join("");

  return `<svg viewBox="0 0 320 300" role="img" aria-label="Corte do ${c.name}">
    <defs>
      <clipPath id="cc-${c.id}"><path d="${CUP_PATH}"/></clipPath>
      <clipPath id="cl-${c.id}"><rect x="36" y="78" width="124" height="206"/></clipPath>
      <clipPath id="cr-${c.id}"><rect x="160" y="78" width="130" height="206"/></clipPath>
      <radialGradient id="gg-${c.id}">
        <stop offset="0%" stop-color="rgba(210,162,107,.28)"/>
        <stop offset="100%" stop-color="rgba(210,162,107,0)"/>
      </radialGradient>
    </defs>
    <circle class="glow" cx="160" cy="178" r="128" fill="url(#gg-${c.id})"/>
    <ellipse class="saucer-b" cx="160" cy="264" rx="92" ry="11"/>
    <ellipse class="saucer-r" cx="160" cy="264" rx="92" ry="11"/>
    <g clip-path="url(#cc-${c.id})">${rects}</g>
    <g class="half hl" clip-path="url(#cl-${c.id})">
      <path class="face" d="${CUP_PATH}"/>${ROSETTA}
      <line class="rim" x1="92" y1="104" x2="228" y2="104"/>
    </g>
    <g class="half hr" clip-path="url(#cr-${c.id})">
      <path class="handle" d="M224 138 C266 134 268 196 218 198"/>
      <path class="face" d="${CUP_PATH}"/>${ROSETTA}
      <line class="rim" x1="92" y1="104" x2="228" y2="104"/>
    </g>
  </svg>`;
}

function keyHTML(c) {
  const rows = [...c.layers].reverse().map((L, i) =>
    `<li style="--i:${i}"><span class="dot" style="background:${L.c}"></span>` +
    `<span class="kn">${L.n}</span><span class="kf">${L.q}</span></li>`
  ).join("");
  return `<ul class="key">${rows}</ul>`;
}

const grid = document.getElementById("grid");
CAFES.forEach((c) => {
  const card = document.createElement("article");
  card.className = "card";
  card.innerHTML =
    `<div class="stage"><div class="cupbox">${cupSVG(c)}</div>${keyHTML(c)}</div>` +
    `<h2>${c.name}</h2><p class="sub">${c.sub}</p><p class="desc">${c.desc}</p>`;
  grid.appendChild(card);
});
</script>
</body>
</html>

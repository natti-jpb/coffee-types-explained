<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coffee, from the inside</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☕</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #F4ECDF;
    background-image:
      radial-gradient(circle at 18% -12%, #FCF7ED 0%, transparent 55%),
      radial-gradient(circle at 105% 110%, #EDE0CC 0%, transparent 45%);
    color: #3E2415;
    font-family: Inter, system-ui, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 34px;
    font-size: 11.5px;
    letter-spacing: .16em;
    text-transform: uppercase;
  }
  .brand { color: #8a6a4f; }
  .langs { display: flex; gap: 6px; }
  .langs button {
    font: 600 11px Inter, sans-serif;
    letter-spacing: .14em;
    background: none;
    border: 1px solid transparent;
    border-radius: 999px;
    color: #a98660;
    padding: 6px 12px;
    cursor: pointer;
    transition: color .25s, border-color .25s, background .25s;
  }
  .langs button:hover { color: #3E2415; }
  .langs button.on {
    color: #3E2415;
    border-color: rgba(62, 36, 21, .25);
    background: rgba(255, 253, 247, .7);
  }

  header { text-align: center; padding: 38px 20px 10px; }
  .eyebrow { font-size: 11px; letter-spacing: .36em; text-transform: uppercase; color: #A5764C; }
  h1 {
    font-family: Fraunces, Georgia, serif;
    font-style: italic;
    font-weight: 380;
    font-size: clamp(42px, 6vw, 74px);
    line-height: 1.05;
    margin: 12px 0 14px;
  }
  .lead { color: #7d5f46; font-size: 15px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(258px, 1fr));
    gap: 22px;
    max-width: 1220px;
    margin: 38px auto 70px;
    padding: 0 28px;
  }

  .card {
    background: #FFFDF7;
    border: 1px solid rgba(62, 36, 21, .07);
    border-radius: 24px;
    padding: 20px 12px 24px;
    position: relative;
    transition: transform .6s cubic-bezier(.22, 1, .36, 1),
                box-shadow .6s cubic-bezier(.22, 1, .36, 1),
                opacity .5s ease, filter .5s ease;
    animation: fadeUp .8s cubic-bezier(.22, 1, .36, 1) both;
    animation-delay: calc(var(--i) * 75ms);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(26px); }
    to { opacity: 1; transform: none; }
  }
  .grid:hover .card:not(:hover) {
    opacity: .38;
    filter: blur(1.6px) saturate(.75);
    transform: scale(.968);
  }
  .card:hover {
    transform: translateY(-12px) scale(1.07);
    box-shadow: 0 40px 70px -26px rgba(62, 36, 21, .40);
    z-index: 3;
  }

  /* cursor spotlight */
  .card::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: radial-gradient(240px circle at var(--mx, 50%) var(--my, 40%),
                rgba(201, 138, 75, .10), transparent 65%);
    opacity: 0;
    transition: opacity .5s;
    pointer-events: none;
  }
  .card:hover::after { opacity: 1; }

  .tilt { will-change: transform; }
  .card svg { display: block; width: 100%; max-width: 280px; margin: 0 auto; overflow: visible; }

  .card h2 {
    font-family: Fraunces, Georgia, serif;
    font-weight: 470;
    font-size: 23px;
    text-align: center;
    margin-top: 10px;
  }
  .card .sub {
    text-align: center;
    font-size: 11px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: #A5764C;
    margin-top: 6px;
  }

  /* ---- vessel ---- */
  .vessel path, .vessel ellipse, .vessel line {
    fill: none;
    stroke: #3E2415;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: opacity .55s ease;
  }
  .card:hover .vessel { opacity: .26; }
  .vessel { transition: opacity .55s ease; }

  .shadow {
    fill: #3E2415;
    opacity: .07;
    transition: opacity .6s, transform .6s cubic-bezier(.22, 1, .36, 1);
    transform-box: fill-box;
    transform-origin: center;
  }
  .card:hover .shadow { opacity: .11; transform: scale(1.12); }

  /* ---- layers ---- */
  .layer {
    transition: transform .7s cubic-bezier(.3, 1.45, .4, 1) calc(var(--k) * 55ms),
                filter .6s ease calc(var(--k) * 55ms);
  }
  .card:hover .layer {
    transform: translateY(calc(var(--k) * -21px));
    filter: drop-shadow(0 9px 7px rgba(62, 36, 21, .16));
  }

  .lbl line {
    stroke: #B08A63;
    stroke-width: 1.2;
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
    transition: stroke-dashoffset .4s ease;
  }
  .lbl text {
    font: 500 11px Inter, sans-serif;
    fill: #6b4a33;
    letter-spacing: .02em;
    opacity: 0;
    transform: translateX(-7px);
    transition: opacity .4s ease, transform .4s ease;
  }
  .card:hover .lbl line {
    stroke-dashoffset: 0;
    transition-delay: calc(var(--k) * 55ms + .18s);
  }
  .card:hover .lbl text {
    opacity: 1;
    transform: none;
    transition-delay: calc(var(--k) * 55ms + .26s);
  }

  /* ---- steam ---- */
  .steam { transition: opacity .35s; }
  .card:hover .steam { opacity: 0; }
  .steam path {
    fill: none;
    stroke: #C9A987;
    stroke-width: 2;
    stroke-linecap: round;
    filter: blur(.7px);
    opacity: 0;
    animation: steam 3.6s ease-in-out infinite;
  }
  .steam path:nth-child(2) { animation-delay: 1.2s; animation-duration: 4.2s; }
  .steam path:nth-child(3) { animation-delay: 2.3s; animation-duration: 3.9s; }
  @keyframes steam {
    0%, 100% { opacity: 0; transform: translateY(6px); }
    35% { opacity: .55; }
    75% { opacity: .08; transform: translateY(-9px); }
  }

  footer {
    text-align: center;
    padding: 0 20px 46px;
    font-size: 12px;
    color: #a98a6f;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

/* ---------------- drinks ---------------- */

/* ---------------- vessels (hand-drawn) ----------------
   Each vessel: outline strokes, interior clip path, liquid

const VESSELS = {

    labelX: 206,

  tulip: {

      { d: "M100 176 L200 176 C198 214 190 240 177 255 Q172 264 162 264 L138 264 Q128 264 123 255 C110 240 102 214 100 176 Z", w: 3 },

      { d: "M82 272 Q150 292 218 272", w: 3 },
    ],
    interior: "M107 182 L193 182 C191 214 184 237 172 251 Q168 258 160 258 L140 258 Q132 258 128 251 C116 237 109 214 107 182 Z",
    iTop: 182, iBot: 258, rim: 176,
    shadow: { cy: 288, rx: 76, ry: 6 },
    labelX: 232,
  },
  cappuccino: {
    strokes: [
      { d: "M96 170 L204 170 C206 208 196 238 178 254 Q173 262 163 262 L137 262 Q127 262 122 254 C104 238 94 208 96 170 Z", w: 3 },
      { d: "M203 188 C230 188 230 226 195 228", w: 6.5 },
      { d: "M78 270 Q150 292 222 270", w: 3 },
    ],
    interior: "M103 176 L197 176 C198 208 189 234 173 249 Q169 256 161 256 L139 256 Q131 256 127 249 C111 234 102 208 103 176 Z",

    shadow: { cy: 288, rx: 80, ry: 6 },
    labelX: 238,
  },
  latteglass: {
    strokes: [
      { d: "M109 96 L191 96 C193 150 189 210 184 240 Q182 258 165 258 L135 258 Q118 258 116 240 C111 210 107 150 109 96 Z", w: 3 },
      { d: "M145 258 L140 274 M155 258 L160 274", w: 2.5 },

/* ---------------- render ---------------- */
const $ = (id) => document.getElementById(id);
const grid = $("grid");
let lang = localStorage.getItem("coffee-lang") || "en";
if (!UI[lang]) lang = "en";

function steamSVG(rim) {
  const y = rim - 8;
  return `<g class="steam">
    <path d="M141 ${y} C136 ${y - 11} 146 ${y - 19} 141 ${y - 31}"/>
    <path d="M159 ${y + 2} C154 ${y - 9} 164 ${y - 17} 159 ${y - 29}"/>
    <path d="M150 ${y - 4} C146 ${y - 14} 154 ${y - 22} 150 ${y - 34}"/>
  </g>`;
}

function cupSVG(c) {
  const v = VESSELS[c.vessel];
  const ih = v.iBot - v.iTop;
  const liquidH = c.fill * ih;
  let cursor = v.iBot;
  const slices = c.layers.map((L, k) => {
    const h = L.f * liquidH;
    const y = cursor - h;
    cursor = y;
    const fill = FILLS[L.i];
    const qty = typeof QTY[L.q] === "object" ? QTY[L.q][lang] : L.q;
    const yc = y + h / 2;
    const pat = fill.pat
      ? `<rect x="88" y="${y.toFixed(1)}" width="124" height="${(h + 0.6).toFixed(1)}" fill="url(#pat-foam)"/>`
      : "";
    return `<g class="layer" style="--k:${k}">
      <g clip-path="url(#int-${c.id})">
        <rect x="88" y="${y.toFixed(1)}" width="124" height="${(h + 0.6).toFixed(1)}" fill="url(#${fill.g})"/>
        ${pat}
      </g>
      <g class="lbl" style="--k:${k}">
        <line x1="${v.labelX}" y1="${yc.toFixed(1)}" x2="${v.labelX + 13}" y2="${yc.toFixed(1)}" pathLength="1"/>
        <text x="${v.labelX + 18}" y="${(yc + 3.5).toFixed(1)}">${ING[L.i][lang]} · ${qty}</text>
      </g>
    </g>`;
  }).join("");

  const strokes = v.strokes
    .map((s) => `<path d="${s.d}" stroke-width="${s.w}"/>`)
    .join("");

  return `<svg viewBox="0 0 360 340" role="img" aria-label="${c.name}">
    <defs><clipPath id="int-${c.id}"><path d="${v.interior}"/></clipPath></defs>
    <ellipse class="shadow" cx="150" cy="${v.shadow.cy}" rx="${v.shadow.rx}" ry="${v.shadow.ry}"/>
    ${steamSVG(v.rim)}
    ${slices}
    <g class="vessel">${strokes}</g>
  </svg>`;
}

function attachTilt(card) {
  const tiltEl = card.querySelector(".tilt");
  let tx = 0, ty = 0, cx = 0, cy = 0, raf = null, hovering = false;
  const step = () => {
    cx += (tx - cx) * 0.12;
    cy += (ty - cy) * 0.12;
    tiltEl.style.transform = `perspective(950px) rotateX(${cy.toFixed(2)}deg) rotateY(${cx.toFixed(2)}deg)`;
    if (hovering || Math.abs(tx - cx) > 0.02 || Math.abs(ty - cy) > 0.02) {
      raf = requestAnimationFrame(step);
    } else {
      raf = null;
      tiltEl.style.transform = "";
    }
  };
  card.addEventListener("pointermove", (e) => {
    const r = card.getBoundingClientRect();
    const px = (e.clientX - r.left) / r.width;
    const py = (e.clientY - r.top) / r.height;
    tx = (px - 0.5) * 9;
    ty = -(py - 0.5) * 7;
    hovering = true;
    card.style.setProperty("--mx", (e.clientX - r.left) + "px");
    card.style.setProperty("--my", (e.clientY - r.top) + "px");
    if (!raf) raf = requestAnimationFrame(step);
  });
  card.addEventListener("pointerleave", () => {
    hovering = false;
    tx = 0; ty = 0;
    if (!raf) raf = requestAnimationFrame(step);
  });
}

function render() {
  const t = UI[lang];
  document.documentElement.lang = lang === "pt" ? "pt-BR" : lang;
  document.title = t.docTitle;
  $("brand").textContent = t.brand;
  $("eyebrow").textContent = t.eyebrow;
  $("title").textContent = t.title;
  $("lead").textContent = t.lead;
  $("footer").textContent = t.footer;

  grid.innerHTML = "";
  CAFES.forEach((c, i) => {
    const card = document.createElement("article");
    card.className = "card";
    card.style.setProperty("--i", i);
    card.innerHTML =
      `<div class="tilt">${cupSVG(c)}</div>` +
      `<h2>${c.name}</h2><p class="sub">${c.sub[lang]}</p>`;
    grid.appendChild(card);
    attachTilt(card);
  });

  document.querySelectorAll(".langs button").forEach((b) => {
    b.classList.toggle("on", b.dataset.lang === lang);
  });
}

$("langs").addEventListener("click", (e) => {
  const b = e.target.closest("button");
  if (!b || b.dataset.lang === lang) return;
  lang = b.dataset.lang;
  localStorage.setItem("coffee-lang", lang);
  render();
});

render();
</script>
</body>
</html>
